fileVersion: 1
id: "1"
macroString: |-
  {#=========================================================
    Initialize variables for node types that use the 
    advanced deployment strategy
  =========================================================== #}
  {% if desiredState %}
      {% set columns = desiredState.columns %}
      {% set storageLocations = desiredState.storageLocations %}
      {% set config = desiredState.config %}
      {% set sources = desiredState.sources %}
      {% set node = desiredState.node %}
      {% set parameters = desiredState.parameters %}
  {% endif %}

  {#=========================================================
    Initialize variables for node types that use the 
    advanced deployment strategy
  ===========================================================#}
  {% macro initializeNodeVariables(nsNodeVariables) %}

    {% if currentState is defined %}
      {% set currentDatabase = currentState.storageLocations 
                                | selectattr('name', 'equalto', currentState.node.location.name)
                                | map(attribute='database')
                                | first %}
      {% set currentSchema = currentState.storageLocations
                              | selectattr('name', 'equalto', currentState.node.location.name)
                              | map(attribute='schema')
                              | first %}
      {% set nsNodeVariables.currentDatabaseSchema = currentDatabase + '.' + currentSchema %}

      {% set nsNodeVariables.curObjectNameFullPath = ref_no_link(currentState.node.location.name, currentState.node.name) %}

    {% endif %}

    {% if desiredState is defined %}
      {% set desiredDatabase = desiredState.storageLocations
                                | selectattr('name', 'equalto', desiredState.node.location.name)
                                | map(attribute='database')
                                | first %}
      {% set desiredSchema = desiredState.storageLocations
                                | selectattr('name', 'equalto', desiredState.node.location.name)
                                | map(attribute='schema')
                                | first %}
      {% set nsNodeVariables.desiredDatabaseSchema = desiredDatabase + '.' + desiredSchema %}

      {% set nsNodeVariables.desObjectNameFullPath = ref_no_link(desiredState.node.location.name, desiredState.node.name) %}

    {% endif %}

  {% endmacro %}

  {# =======================================================================================
    Purpose: Generates the correct PARTITION BY expression based on the user’s configuration.
    Supports ingestion time, integer range, and time-unit column partitioning, 
    and falls back to defaults when no custom expression is provided.
    Input Parameters : None
    Returns          : String representing the PARTITION BY clause
  ========================================================================================= #}
  {% macro getPartitionBy() %}

    {%- set varPartitionBy = "" -%}

    {% if config.partitionByToggle %}
        {% if config.partByColumnConfig == 'Ingestion Time' %}
          {% if config.partByIngnTimeExpression != "" %}
            {%- set varPartitionBy = config.partByIngnTimeExpression -%}
          {% else %}
              {%- set varPartitionBy = "_PARTITIONDATE" -%}
          {% endif %}

        {% elif config.partByColumnConfig == 'Integer Range' %}
          {%- set varPartitionBy = config.partByIntSqlExpression|trim -%}

        {% elif config.partByColumnConfig == 'Time-Unit Column' %}
          {% if config.partByTimeSqlExpression|trim|length > 0 %}
            {%- set varPartitionBy = config.partByTimeSqlExpression|trim -%}
          {% else %}
            {%- set varPartitionBy = config.partByColumn.name -%}
          {% endif %}
        {% endif %}
    {% endif %}

    {{ varPartitionBy }}

  {% endmacro %}

  {# ===================================================================================
    Purpose: Builds the CLUSTER BY clause from the selected clustering columns.
    Uses up to four columns from the config and returns them as a comma-separated list.
    Input Parameters : None
    Returns          : String representing the CLUSTER BY clause
  ====================================================================================== #}
  {% macro getClusterBy() %}

    {# Create namespaces #}
    {% set varClusterBy = "" %}

    {% if config.clusterKeyToggle and config.clusterKeyConfig is defined %}
          {%- set varClusterBy = config.clusterKeyConfig.get('items', [])[:4]
                                          | map(attribute='clustColumn')
                                          | map(attribute='name')
                                          | list | join(', ') -%}
    {% endif %}

    {{- varClusterBy -}}
  {% endmacro %}

  {# ==================================================================================
    Purpose: Returns the list of selected primary key columns as a comma-separated 
    string, using values from the primary key configuration safely
    Input Parameters : None
    Returns          : String representing the PRIMARY KEY clause
  ===================================================================================== #}
  {% macro getPrimaryKey() %}

    {# Create namespaces #}
    {% set varPrimaryKey = "" %}

    {% if config.primaryToggle %}
        {# Extract column names safely #}
        {% set varPrimaryKey = config.primaryKeyConfig.get('items', [])
                                        | map(attribute='primaryKeyColumn')
                                        | map(attribute='name')
                                        | list | join(', ') %}
    {% endif %}

    {{ varPrimaryKey }}
  {% endmacro %}

  {# ========================================================================
    Purpose: Builds the table expiration expression based on the selected type. 
    Supports exact date or datetime values and day-based offsets, 
    converting inputs into a valid TIMESTAMP
    Input Parameters : None
    Returns          : String representing the Table Expiration clause
  ========================================================================= #}
  {% macro getTabExpirationClause() %}

    {# Create namespaces #}
    {% set varTabExprn = "" %}

    {% if config.tabExpirationToggle and config.exprnType != '' %}
      {% if config.exprnType == 'EXACT DATE/DATETIME' and config.timeExprnExpression|trim|length > 0 %}
        {% if config.timeExprnExpression|trim|length > 11 %}
          {% set varTabExprn = 'TIMESTAMP "' + config.timeExprnExpression|trim + '"' %}
        {% else %}
          {% set varTabExprn = 'TIMESTAMP "' + config.timeExprnExpression|trim + ' 23:59:59"' %}
        {% endif %}
      {% elif config.exprnType == 'DAYS FROM NOW'and config.dayExprnExpression|trim|length > 0 %}
        {% set varTabExprn = 'TIMESTAMP_ADD(CURRENT_TIMESTAMP(), INTERVAL ' +  config.dayExprnExpression|trim + ' DAY)' %}
      {% endif %}
    {% endif %}

    {{ varTabExprn }}

  {% endmacro %}

  {# =======================================================================================
    Purpose: Returns the default rounding mode. Uses the user-selected value if provided;
    otherwise falls back to ROUND_HALF_AWAY_FROM_ZERO
    Input Parameters : None
    Returns          : String representing the Default Rounding Mode
  ========================================================================================== #}
  {% macro getDefaultRoundingMode() %}

    {# Create namespaces #}
    {% set varDefRndMd = namespace(elements = "") %}

    {% if config.defRndMode == '' %}
      {% set varDefRnd = 'ROUND_HALF_AWAY_FROM_ZERO' %}
    {% else %}
      {% set varDefRndMd = config.defRndMode %}
    {% endif %}

    {{ varDefRndMd }}

  {% endmacro %}

  {###########################################################################################
  Purpose:
  Determines the correct BigQuery DROP object syntax based on the materialization type.

  Input:
  - materialization (string): The BigQuery object type to be dropped
    (e.g., table, view, materialized view, external table, snapshot, clone).

  Returns:
  - string: The appropriate DROP object keyword with IF EXISTS
    (e.g., 'TABLE IF EXISTS', 'VIEW IF EXISTS', 'MATERIALIZED VIEW IF EXISTS').
  #############################################################################################}
  {% macro dropMaterialization(materialization) %}

      {% if materialization in ['table', 'clone'] %}
          TABLE IF EXISTS

      {% elif materialization == 'snapshot' %}
          SNAPSHOT TABLE IF EXISTS

      {% elif materialization in ['view', 'authorized view'] %}
          VIEW IF EXISTS

      {% elif materialization == 'materialized view' %}
          MATERIALIZED VIEW IF EXISTS

      {% elif materialization == 'external table', 'BigLake table' %}
          EXTERNAL TABLE IF EXISTS

      {% elif materialization == 'temporary table' %}
          TABLE IF EXISTS   {# temp tables usually don’t need DROP, but kept for symmetry #}

      {% else %}
          TABLE IF EXISTS   {# safe default for BigQuery #}

      {% endif %}

  {% endmacro %}
name: macro
type: Macro
