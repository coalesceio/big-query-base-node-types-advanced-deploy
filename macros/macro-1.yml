fileVersion: 1
id: "1"
macroString: |-
  {# ----------------------------------------------------------------------
    Macro: columDictionary
    Purpose: Builds a dictionary (ns.column_dict) of columns for all sources
  ---------------------------------------------------------------------- #}
  {% macro columnDictionary(ns) %}
    {% if sources is defined %}
      {% for source_idx in range(sources | length) %}
        {% set source = sources[source_idx] %}

        {# Initialize the source entry if missing #}
        {% if source_idx not in ns.column_dict %}
          {% set _ = ns.column_dict.update({source_idx: {}}) %}
        {% endif %}

        {# Add all columns in this source to the dictionary #}
        {% for column in source.columns %}
          {% set _ = ns.column_dict[source_idx].update({column.id: column}) %}
        {% endfor %}
      {% endfor %}
    {% endif %}
  {% endmacro %}

  {#--------------------------------------------------------
    Initialize variables for node types that use the 
    advanced deployment strategy
  ----------------------------------------------------------#}
  {% if desiredState %}
      {% set columns = desiredState.columns %}
      {% set storageLocations = desiredState.storageLocations %}
      {% set config = desiredState.config %}
      {% set sources = desiredState.sources %}
      {% set node = desiredState.node %}
      {% set parameters = desiredState.parameters %}

      {% set ns = namespace(column_dict = {}) %}
      {# Populate column dictionary #}
      {{ columnDictionary(ns) }}

  {% endif %}

  {#--------------------------------------------------------
    Initialize variables for node types that use the 
    advanced deployment strategy
  ----------------------------------------------------------#}
  {% macro initializeAllVariables(nsAllVariables) %}

    {% if currentState is defined %}
      {% set currentDatabase = currentState.storageLocations 
                                | selectattr('name', 'equalto', currentState.node.location.name)
                                | map(attribute='database')
                                | first %}
      {% set currentSchema = currentState.storageLocations
                              | selectattr('name', 'equalto', currentState.node.location.name)
                              | map(attribute='schema')
                              | first %}
      {% set nsAllVariables.currentDatabaseSchema = currentDatabase + '.' + currentSchema %}
    {% endif %}

    {% if currentState is defined %}
      {% set desiredDatabase = desiredState.storageLocations
                                | selectattr('name', 'equalto', desiredState.node.location.name)
                                | map(attribute='database')
                                | first %}
      {% set desiredSchema = desiredState.storageLocations
                                | selectattr('name', 'equalto', desiredState.node.location.name)
                                | map(attribute='schema')
                                | first %}
      {% set nsAllVariables.desiredDatabaseSchema = desiredDatabase + '.' + desiredSchema %}
    {% endif %}
  {% endmacro %}

  {# =========================================================
    Purpose: Generates the PARTITION BY clause
    Input Parameters : None
    Returns          : String representing the PARTITION BY clause
  ========================================================= #}
  {% macro getPartitionBy(nsPartitionBy) %}

    {# Macro to build partitionBy from config and store in namespace #}
    {%- set nsPartitionBy = namespace(elements = "") -%}

    {% if config.partitionBy %}
        {% if config.partByColumnConfig == 'INGESTION TIME'%}
    
          {%- set nsPartitionBy.elements = config.partByIngnTimeExpression
                if config.partByIngnTimeExpression != "" else "_PARTITIONDATE" -%}

        {% elif config.partByColumnConfig == 'COLUMN' %}
          {%- set nsPartitionBy.elements = config.partByColumn.name -%}

        {% elif config.partByColumnConfig == 'COLUMN EXPRESSION' %}
          {%- set nsPartitionBy.elements = config.partBySqlExpression -%}
        {% endif %}
    {% endif %}
    {{ nsPartitionBy.elements }}

  {% endmacro %}

  {# -----------------------------------------------------------------------------
    Purpose: Generates the CLUSTER BY clause
    Input Parameters : None
    Returns          : String representing the CLUSTER BY clause
  ----------------------------------------------------------------------------- #}
  {% macro getClusterBy() %}

    {# Create namespaces #}
    {% set nsClusterBy = namespace(elements = "") %}

    {% if config.clusterKey and config.clusterKeyConfig is defined %}
          {%- set nsClusterBy.elements = config.clusterKeyConfig.get('items', [])[:4]
                                          | map(attribute='clustColumn')
                                          | map(attribute='name')
                                          | list | join(', ') -%}
      {% endif %}

    {{ nsClusterBy.elements }}
  {% endmacro %}

  {# =========================================================
    Purpose: Generates the PRIMARY KEY clause
    Input Parameters : None
    Returns          : String representing the PRIMARY KEY clause
  ========================================================= #}
  {% macro getPrimaryKey() %}

    {# Create namespaces #}
    {% set nsPrimaryKey = namespace(elements = "") %}

      {% if config.primary %}
          {# Extract column names safely #}
          {% set nsPrimaryKey.elements = config.primaryKeyCol.get('items', [])
                                          | map(attribute='primaryKey')
                                          | map(attribute='name')
                                          | list | join(', ') %}
      {% endif %}

    {{ nsPrimaryKey.elements }}
  {% endmacro %}

  {# -----------------------------------------------------------------------------
    Purpose: Generates the Table Expiration clause
    Input Parameters : None
    Returns          : String representing the Table Expiration clause
  ----------------------------------------------------------------------------- #}
  {% macro getTabExpirationClause() %}

    {# Create namespaces #}
    {% set nsTabExprn = namespace(elements = "") %}

    {# Loop through all items, using loop.index0 if needed #}
    {% for item in config.tabExpirationConfig.get('items', []) %}
        
      {% if loop.index0 == 0 %}
        {# Build Options By #}
        {% if item.exprnType != '' %}
          {% if item.exprnType == "EXACT TIMESTAMP" %}
            {% set nsTabExprn.elements = 'TIMESTAMP "' + item.timeExprnExpression + '"' %}
          {% elif item.exprnType == "EXACT DATE ONLY" %}
            {% set nsTabExprn.elements = 'TIMESTAMP "' + item.timeExprnExpression + ' 23:59:59"' %}
          {% elif item.exprnType == "DAYS FROM NOW" %}
            {% set nsTabExprn.elements = 'TIMESTAMP_ADD(CURRENT_TIMESTAMP(), INTERVAL ' +  item.timeExprnExpression + ' DAY)' %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}

      {{ nsTabExprn.elements }}

  {% endmacro %}
name: macro
type: Macro
