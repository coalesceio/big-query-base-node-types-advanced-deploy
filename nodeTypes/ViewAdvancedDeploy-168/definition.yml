fileVersion: 1
id: "168"
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |
    capitalized: View
    short: v
    tagColor: '#C4C4C4'
    isDisabled: true
    plural: Views

    deployStrategy: advanced

    config:
    - groupName: Options
      items:
      - displayName: OverrideCreateSQL
        attributeName: OverrideSQLCreate
        type: overrideSQLToggle
        default: false

      - type: multisourceToggle 
        enableIf: "{% if node.materializationType == 'view' and node.override.create.enabled %} false {% else %} true {% endif %}"
        default: false

      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: "UNION ALL"
        options:
        - "UNION DISTINCT"
        - "UNION ALL" 
        isRequired: false
        enableIf: "{% if node.override.create.enabled != true and node.isMultisource %} true {% else %} false {% endif %}"

      - displayName: Distinct
        attributeName: selectDistinct
        type: toggleButton
        enableIf: "{% if config.groupByAll or  node.override.create.enabled %} false {% else %} true {% endif %}"
        default: false

      - displayName: Group By All
        attributeName: groupByAll
        type: toggleButton
        enableIf: "{% if config.selectDistinct or node.override.create.enabled %} false {% else %} true {% endif %}" 
        default: false

    - groupName: Hidden Config
      enableIf: "false"
      items:
      - displayName: Type
        type: materializationSelector
        default:  view
        options:
        - view
        isRequired: false
name: View Advanced Deploy
type: NodeType
