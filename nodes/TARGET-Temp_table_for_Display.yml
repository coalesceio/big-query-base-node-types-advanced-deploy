        customSQL:
          customSQL: |-
            {{ stage('Override Create SQL') }}
            create or replace table `cls-dev-bigquery`.`DE_TGT`.`Temp_table_for_Display`
            as
                  SELECT `nation2`.`N_NATIONKEY` AS `N_NATIONKEY`,
                    `nation2`.`N_NAME` AS `N_NAME`,
                    `nation2`.`N_REGIONKEY` AS `N_REGIONKEY`,
                    `nation2`.`N_COMMENT` AS `N_COMMENT`,
                    NULL AS `last_modified`,
                    `DIM`.`system_version` + 1 AS `system_version`,
                    'Y' AS `system_current_flag`,
                    CAST(CURRENT_TIMESTAMP AS TIMESTAMP) AS `system_start_date`,
                    CAST('2999-12-31 00:00:00' AS TIMESTAMP) AS `system_end_date`,
                    CAST(CURRENT_TIMESTAMP AS TIMESTAMP) AS `system_create_date`,
                    CAST(CURRENT_TIMESTAMP AS TIMESTAMP) AS `system_update_date`,
                    'INSERT_NEW_VERSION_ROWS' AS `DML_OPERATION`
                  FROM `cls-qa`.`tpch_sf001`.`nation2` `nation2`
                    INNER JOIN `cls-dev-bigquery`.`DE_TGT`.`dim_nation1` `DIM` ON `nation2`.`N_NATIONKEY` = `DIM`.`N_NATIONKEY`
                  WHERE `DIM`.`system_current_flag` = 'Y'
                    AND COALESCE(NULL, CURRENT_TIMESTAMP()) > `DIM`.`last_modified`
                    AND `nation2`.`N_NATIONKEY` = 2
        dependencies:
